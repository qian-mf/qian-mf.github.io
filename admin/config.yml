backend:
  name: git-gateway
  repo: qian-mf/qian-mf.github.io
  branch: master
  identity_url: https://auth.decapbridge.com/sites/bd81d17a-1b19-416f-83b9-0f4c5e4f1d95
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://qian-mf.github.io

media_folder: "img/uploads"
public_folder: "/img/uploads"
    
collections:
  - name: "posts"
    label: "博文"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "布局", name: "layout", widget: "hidden", default: "post"}
      - {label: "标题", name: "title", widget: "string"}
      - {label: "文件名", name: "slug", widget: "string", hint: "请输入英文文件名，如：my-first-post，系统会自动添加日期前缀"}
      - {label: "副标题", name: "subtitle", widget: "string", required: false}
      - {label: "日期", name: "date", widget: "datetime"}
      - {label: "作者", name: "author", widget: "string", default: "錢牧風"}
      - {label: "头部图片", name: "header-img", widget: "image", required: false, allow_multiple: false}
      - {label: "是否显示目录", name: "catalog", widget: "boolean", default: true}
      - {label: "标签", name: "tags", widget: "list", required: false}
      - {label: "正文", name: "body", widget: "markdown"}

  - name: "pages"
    label: "页面"
    files:
      - name: "about"
        label: "关于我"
        file: "about.html"
        fields:
          - {label: "布局", name: "layout", widget: "hidden", default: "page"}
          - {label: "标题", name: "title", widget: "string"}
          - {label: "正文", name: "body", widget: "markdown"}
      - name: "portfolio"
        label: "作品集"
        file: "portfolio.html"
        fields:
          - {label: "布局", name: "layout", widget: "hidden", default: "page"}
          - {label: "标题", name: "title", widget: "string"}
          - {label: "正文", name: "body", widget: "markdown"}
