backend:
  name: git-gateway
  repo: qian-mf/qian-mf.github.io
  branch: master
  identity_url: https://auth.decapbridge.com/sites/bd81d17a-1b19-416f-83b9-0f4c5e4f1d95
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://qian-mf.github.io

media_folder: "img/uploads"
public_folder: "img/uploads"

collections:
  - name: "posts"
    label: "博文"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "布局", name: "layout", widget: "hidden", default: "post"}
      - {label: "标题", name: "title", widget: "string"}
      - {label: "文件名", name: "slug", widget: "string", hint: "请输入英文文件名，如：my-first-post，系统会自动添加日期前缀"}
      - {label: "副标题", name: "subtitle", widget: "string", required: false}
      - {label: "日期", name: "date", widget: "datetime"}
      - {label: "作者", name: "author", widget: "string", default: "錢牧風"}
      - {label: "头部图片", name: "header-img", widget: "image", required: false, allow_multiple: false}
      - {label: "是否显示目录", name: "catalog", widget: "boolean", default: true}
      - {label: "标签", name: "tags", widget: "list", required: false}
      - {label: "正文", name: "body", widget: "markdown"}

  - name: "pages"
    label: "页面"
    files:
      - name: "about"
        label: "关于我"
        file: "about.html"
        fields:
          - {label: "布局", name: "layout", widget: "hidden", default: "page"}
          - {label: "标题", name: "title", widget: "string"}
          - {label: "正文", name: "body", widget: "markdown"}

  - name: "portfolio"
    label: "作品集"
    files:
      - name: "portfolio"
        label: "常设展览"
        file: "_data/portfolio.yml"
        fields:
          - label: "作品列表"
            name: "portfolio_list"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "作品标题", name: "title", widget: "string"}
              - {label: "作品图片", name: "image", widget: "image", allow_multiple: false}
              - {label: "作品描述", name: "description", widget: "text"}
              - {label: "排序", name: "order", widget: "number", default: 1, hint: "数字越小越靠前"}


  - name: "special"
    label: "特别展览"
    files:
      - name: "special_exhibitions"
        label: "特展管理"
        file: "_data/special_exhibitions.yml"
        fields:
          - label: "特展列表"
            name: "special_exhibitions"
            widget: "list"
            summary: "{{fields.title}} - {{fields.online}}"
            fields:
              - {label: "唯一标识符", name: "id", widget: "string", hint: "英文ID，如 special-2024，如已存在会自动识别"}
              - {label: "特展标题", name: "title", widget: "string"}
              - {label: "简短描述", name: "description", widget: "text", required: false}
              - {label: "展览介绍", name: "intro", widget: "text", required: false}
              - {label: "上线", name: "online", widget: "boolean", default: false, hint: "勾选后特展将在导航中显示"}
              - {label: "排序", name: "order", widget: "number", default: 1}
              - label: "作品列表"
                name: "artworks"
                widget: "list"
                fields:
                  - {label: "作品标题", name: "title", widget: "string"}
                  - {label: "作品图片", name: "image", widget: "image", allow_multiple: false}
                  - {label: "作品描述", name: "description", widget: "text", required: false}
