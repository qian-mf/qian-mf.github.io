---
layout: null
title: Admin
hide-in-nav: true
---
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星川廬 - 内容管理</title>
  <link rel="stylesheet" href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  {% raw %}
  <script>
    CMS.registerPreviewStyle('/css/hux-blog.css');
    
    CMS.registerEditorComponent({
      id: "post-image",
      label: "高级图片",
      fields: [
        { name: "src", label: "图片地址", widget: "string" },
        { name: "alt", label: "图片描述", widget: "string", required: false },
        { 
          name: "size", 
          label: "图片大小", 
          widget: "select",
          options: [
            { label: "小 (200px)", value: "small" },
            { label: "中 (400px)", value: "medium" },
            { label: "大 (600px)", value: "large" },
            { label: "全宽", value: "full" }
          ],
          default: "medium"
        },
        { 
          name: "align", 
          label: "图片位置", 
          widget: "select",
          options: [
            { label: "居中", value: "center" },
            { label: "左对齐", value: "left" },
            { label: "右对齐", value: "right" }
          ],
          default: "center"
        },
        { 
          name: "mode", 
          label: "点击放大", 
          widget: "select",
          options: [
            { label: "否", value: "normal" },
            { label: "是", value: "thumbnail" }
          ],
          default: "normal"
        }
      ],
      pattern: /\{%\s*include\s+post_image\.html\s+([^%]+)\s*%\}/,
      fromBlock: function(match) {
        var params = match[1];
        var srcMatch = params.match(/src="([^"]+)"/);
        var altMatch = params.match(/alt="([^"]*)"/);
        var sizeMatch = params.match(/size="([^"]+)"/);
        var alignMatch = params.match(/align="([^"]+)"/);
        var modeMatch = params.match(/mode="([^"]+)"/);
        return {
          src: srcMatch ? srcMatch[1] : '',
          alt: altMatch ? altMatch[1] : '',
          size: sizeMatch ? sizeMatch[1] : 'medium',
          align: alignMatch ? alignMatch[1] : 'center',
          mode: modeMatch ? modeMatch[1] : 'normal'
        };
      },
      toBlock: function(obj) {
        var src = obj.src || '';
        var alt = obj.alt || '';
        var size = obj.size || 'medium';
        var align = obj.align || 'center';
        var mode = obj.mode || 'normal';
        return '{% include post_image.html src="' + src + '" alt="' + alt + '" size="' + size + '" align="' + align + '" mode="' + mode + '" %}';
      },
      toPreview: function(obj) {
        var sizeMap = { small: '200px', medium: '400px', large: '600px', full: '100%' };
        var maxWidth = sizeMap[obj.size] || '400px';
        var alignStyle = obj.align === 'center' ? 'text-align:center;' : (obj.align === 'left' ? 'float:left;margin-right:16px;' : 'float:right;margin-left:16px;');
        var html = '<figure style="' + alignStyle + 'max-width:' + maxWidth + ';margin:16px 0;">';
        html += '<img src="' + (obj.src || '') + '" alt="' + (obj.alt || '') + '" style="max-width:100%;border-radius:4px;">';
        if (obj.alt) {
          html += '<figcaption style="font-size:13px;color:#666;margin-top:8px;">' + obj.alt + '</figcaption>';
        }
        html += '</figure>';
        return html;
      }
    });
    
    CMS.registerEditorComponent({
      id: "image-row",
      label: "多图并排",
      fields: [
        { 
          name: "count", 
          label: "每行图片数量", 
          widget: "select",
          options: [
            { label: "2张", value: "2" },
            { label: "3张", value: "3" },
            { label: "4张", value: "4" }
          ],
          default: "3"
        },
        {
          name: "images",
          label: "图片列表",
          widget: "list",
          fields: [
            { name: "src", label: "图片地址", widget: "string" },
            { name: "alt", label: "描述", widget: "string", required: false }
          ]
        }
      ],
      pattern: /\{%\s*include\s+image_row\.html\s+([^%]+)\s*%\}/,
      fromBlock: function(match) {
        var params = match[1];
        var countMatch = params.match(/count="([^"]+)"/);
        var imagesMatch = params.match(/images="([^"]+)"/);
        var images = [];
        if (imagesMatch) {
          var imgList = imagesMatch[1].split(',');
          for (var i = 0; i < imgList.length; i++) {
            var parts = imgList[i].split('|');
            if (parts[0] && parts[0].trim()) {
              images.push({ src: parts[0].trim(), alt: parts[1] ? parts[1].trim() : '' });
            }
          }
        }
        return { count: countMatch ? countMatch[1] : '3', images: images };
      },
      toBlock: function(obj) {
        var imagesStr = '';
        if (obj.images && obj.images.length > 0) {
          for (var i = 0; i < obj.images.length; i++) {
            imagesStr += obj.images[i].src + '|' + (obj.images[i].alt || '');
            if (i < obj.images.length - 1) imagesStr += ',';
          }
        }
        return '{% include image_row.html count="' + (obj.count || '3') + '" images="' + imagesStr + '" %}';
      },
      toPreview: function(obj) {
        var count = parseInt(obj.count) || 3;
        var widthPercent = Math.floor(100 / count) - 2;
        var html = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;">';
        if (obj.images) {
          for (var i = 0; i < obj.images.length; i++) {
            var img = obj.images[i];
            html += '<div style="flex:1 1 ' + widthPercent + '%;min-width:150px;text-align:center;">';
            html += '<img src="' + (img.src || '') + '" alt="' + (img.alt || '') + '" style="max-width:100%;border-radius:4px;">';
            if (img.alt) {
              html += '<p style="font-size:12px;color:#666;margin:4px 0 0;">' + img.alt + '</p>';
            }
            html += '</div>';
          }
        }
        html += '</div>';
        return html;
      }
    });
    
    var h = CMS.h || (typeof React !== 'undefined' ? React.createElement : null);
    if (h) {
      CMS.registerPreviewTemplate('posts', function(props) {
        var entry = props.entry;
        var body = entry.getIn(['data', 'body']) || '';
        var includePattern = /\{%\s*include\s+(post_image|image_row)\.html\s+([^%]+)\s*%\}/g;
        body = body.replace(includePattern, function(match, type, params) {
          if (type === 'post_image') {
            var srcMatch = params.match(/src="([^"]+)"/);
            var altMatch = params.match(/alt="([^"]*)"/);
            var sizeMatch = params.match(/size="([^"]+)"/);
            var alignMatch = params.match(/align="([^"]+)"/);
            var src = srcMatch ? srcMatch[1] : '';
            var alt = altMatch ? altMatch[1] : '';
            var size = sizeMatch ? sizeMatch[1] : 'medium';
            var align = alignMatch ? alignMatch[1] : 'center';
            var sizeMap = { small: '200px', medium: '400px', large: '600px', full: '100%' };
            var maxWidth = sizeMap[size] || '400px';
            var alignStyle = align === 'center' ? 'text-align:center;' : (align === 'left' ? 'float:left;margin-right:16px;' : 'float:right;margin-left:16px;');
            return '<figure style="' + alignStyle + 'max-width:' + maxWidth + ';margin:16px 0;"><img src="' + src + '" alt="' + alt + '" style="max-width:100%;border-radius:4px;">' + (alt ? '<figcaption style="font-size:13px;color:#666;margin-top:8px;">' + alt + '</figcaption>' : '') + '</figure>';
          } else if (type === 'image_row') {
            var countMatch = params.match(/count="([^"]+)"/);
            var imagesMatch = params.match(/images="([^"]+)"/);
            var count = countMatch ? countMatch[1] : '3';
            var imagesStr = imagesMatch ? imagesMatch[1] : '';
            var imgArr = imagesStr.split(',');
            var widthPercent = Math.floor(100 / parseInt(count)) - 2;
            var html = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;">';
            for (var i = 0; i < imgArr.length; i++) {
              var parts = imgArr[i].split('|');
              var imgSrc = (parts[0] || '').trim();
              var imgAlt = (parts[1] || '').trim();
              if (imgSrc) {
                html += '<div style="flex:1 1 ' + widthPercent + '%;min-width:150px;text-align:center;"><img src="' + imgSrc + '" alt="' + imgAlt + '" style="max-width:100%;border-radius:4px;">' + (imgAlt ? '<p style="font-size:12px;color:#666;margin:4px 0 0;">' + imgAlt + '</p>' : '') + '</div>';
              }
            }
            html += '</div>';
            return html;
          }
          return match;
        });
        return h('div', { dangerouslySetInnerHTML: { __html: body } });
      });
    }
  </script>
  {% endraw %}
</body>
</html>
