<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星川廬 - 内容管理</title>
  <link rel="stylesheet" href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" />
  <style>
    .cms-editor-ctrl textarea {
      tab-size: 4;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    var ready = false;
    
    function setupTabIndent() {
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
          var textarea = document.querySelector('.cms-editor-ctrl textarea, .ProseMirror');
          if (textarea && document.activeElement === textarea) {
            e.preventDefault();
            var start = textarea.selectionStart;
            var end = textarea.selectionEnd;
            var value = textarea.value;
            var lineStart = value.lastIndexOf('\n', start - 1) + 1;
            var isLineStart = (start === lineStart);
            
            if (isLineStart) {
              textarea.value = value.substring(0, start) + '　　' + value.substring(end);
              textarea.selectionStart = textarea.selectionEnd = start + 2;
            } else {
              textarea.value = value.substring(0, start) + '    ' + value.substring(end);
              textarea.selectionStart = textarea.selectionEnd = start + 4;
            }
            textarea.dispatchEvent(new Event('input', { bubbles: true }));
          }
        }
      });
    }
    
    if (typeof CMS !== 'undefined') {
      CMS.registerEventListener({
        name: 'mounted',
        handler: setupTabIndent
      });
    }
  </script>
</body>
</html>
