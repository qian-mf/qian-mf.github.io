<section class="information-widget">
  <hr>
  <h5>INFORMATION</h5>
  <div class="info-content">
    <div class="info-item">
      <span class="info-label">文章数目</span>
      <span class="info-value">{{ site.posts | size }} 篇</span>
    </div>
    <div class="info-item">
      <span class="info-label">本站总字数</span>
{% assign words = post.content | number_of_words %}{% assign total_words = total_words | plus: words %}    </div>
    <div class="info-item">
      <span class="info-label">最后更新时间</span>
      <span class="info-value" id="last-updated" data-time="{{ site.time | date: '%Y-%m-%dT%H:%M:%S' }}">
        <span class="loading-text">计算中...</span>
      </span>
    </div>
  </div>
</section>

<script>
(function() {
  function timeAgo(date) {
    var seconds = Math.floor((new Date() - date) / 1000);
    var interval = Math.floor(seconds / 31536000);
    if (interval >= 1) {
      return interval + ' 年前';
    }
    interval = Math.floor(seconds / 2592000);
    if (interval >= 1) {
      return interval + ' 个月前';
    }
    interval = Math.floor(seconds / 86400);
    if (interval >= 1) {
      return interval + ' 天前';
    }
    interval = Math.floor(seconds / 3600);
    if (interval >= 1) {
      return interval + ' 小时前';
    }
    interval = Math.floor(seconds / 60);
    if (interval >= 1) {
      return interval + ' 分钟前';
    }
    return '刚刚';
  }

  var el = document.getElementById('last-updated');
  if (el) {
    var timeStr = el.getAttribute('data-time');
    if (timeStr) {
      var date = new Date(timeStr);
      el.innerHTML = timeAgo(date);
    }
  }
})();
</script>
